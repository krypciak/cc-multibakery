name: Build check

on:
    workflow_dispatch:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: latest
                  cache: 'pnpm'

            - name: Install pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: latest
                  run_install: true

            - name: Compile
              run: pnpm run start
